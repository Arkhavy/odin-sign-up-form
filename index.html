<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="meyer-reset.css">
	<link rel="stylesheet" href="style.css">
	<title>Document</title>
</head>

<body>
	<div class="side-container">
		<figure>
			<img src="image/halie-west-25xggax4bSA-unsplash.jpg" alt="Halie West jungle leaf photo" id="leaf-image">
			<figcaption>
				<p>
					Photo by <a
						href="https://unsplash.com/@haliewestphoto?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Halie
						West</a> on <a
						href="https://unsplash.com/photos/green-leaf-plant-in-close-up-photography-25xggax4bSA?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Unsplash</a>
				</p>
			</figcaption>
		</figure>
		<div>
			<img src="image/odin-lined.png" alt="Odin lined logo" id="odin-image">
			<p>ODIN</p>
		</div>
	</div>
	<main>
		<div id="form-header">
			<p>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams.<br>Sign up <span class="italic">now</span> to get started.<br><br>You <span class="italic">know</span> you want to.
			</p>
		</div>
		<form id="main-form">
			<p>Let's do this !</p>
			<label for="first-name">FIRST NAME</label>
			<input type="text" id="first-name">

			<label for="last-name">LAST NAME</label>
			<input type="text" id="last-name">

			<label for="email">EMAIL</label>
			<input type="email" id="email">

			<label for="phone-number">PHONE NUMBER</label>
			<input type="tel" id="phone-number">

			<label for="password">PASSWORD</label>
			<input type="password" id="password">

			<label for="confirm">CONFIRM PASSWORD</label>
			<input type="password" id="confirm">
		</form>
		<div id="form-footer">
			<button type="submit" form="main-form">Create Account</button>
			<p>Already have an account ? <a href="">Log in</a></p>
		</div>
	</main>
</body>

</html>
